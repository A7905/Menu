<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxury Restaurant Menu</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
    }

    .menu-container {
      width: 100%;
      height: 100vh;
      position: relative;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== IMAGE FULL SCREEN ===== */

    .menu-image {
      width: 100%;
      height: 88vh;
      object-fit: contain;
      transition: opacity 0.3s ease;
    }

    /* ===== TOP INFO ===== */

    .top-bar {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
      color: white;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 15px;
      letter-spacing: 0.5px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ===== BOTTOM CONTROLS ===== */

    .controls {
      position: absolute;
      bottom: 25px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 18px;
      z-index: 10;
    }

    .btn {
      padding: 12px 26px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    /* ===== MOBILE ===== */

    @media (max-width: 768px) {

      .menu-image {
        height: 92vh;
      }

      .btn {
        padding: 10px 18px;
        font-size: 14px;
      }

      .top-bar {
        font-size: 13px;
        padding: 8px 18px;
      }

    }
  </style>
</head>

<body>

  <div class="menu-container">

    <!-- PAGE COUNT -->
    <div class="top-bar" id="pageCount">
      Menu Page 1 / 15
    </div>

    <!-- MENU IMAGE -->
    <img id="menuImage" class="menu-image" src="page1.jpg" alt="Restaurant Menu">

    <!-- CONTROLS -->
    <div class="controls">

      <button class="btn" onclick="prevPage()">
        ← Previous
      </button>

      <button class="btn" onclick="nextPage()">
        Next →
      </button>

    </div>

  </div>

  <script>

    // ===== TOTAL MENU PAGES =====
    const totalPages = 15;

    let currentPage = 1;

    const image = document.getElementById("menuImage");
    const pageCount = document.getElementById("pageCount");

    function updatePage() {

      image.style.opacity = 0;

      setTimeout(() => {

        image.src = `page${currentPage}.jpg`;

        pageCount.innerText = `Menu Page ${currentPage} / ${totalPages}`;

        image.style.opacity = 1;

      }, 150);

    }

    // ===== NEXT PAGE =====

    function nextPage() {

      if (currentPage < totalPages) {

        currentPage++;
        updatePage();

      }

    }

    // ===== PREVIOUS PAGE =====

    function prevPage() {

      if (currentPage > 1) {

        currentPage--;
        updatePage();

      }

    }

    // ===== KEYBOARD SUPPORT =====

    document.addEventListener("keydown", (e) => {

      if (e.key === "ArrowRight") {
        nextPage();
      }

      if (e.key === "ArrowLeft") {
        prevPage();
      }

    });

    // ===== MOBILE SWIPE SUPPORT =====

    let startX = 0;

    document.addEventListener("touchstart", (e) => {

      startX = e.touches[0].clientX;

    });

    document.addEventListener("touchend", (e) => {

      let endX = e.changedTouches[0].clientX;

      if (startX - endX > 50) {
        nextPage();
      }

      if (endX - startX > 50) {
        prevPage();
      }

    });

  </script>

</body>

</html>
