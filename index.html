<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luxury Digital Flipbook</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:1000px;
      height:92vh;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
      position:relative;
      display:flex;
      flex-direction:column;
    }

    .header{
      padding:18px 25px;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(255,255,255,0.05);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .header h2{
      font-size:22px;
      font-weight:600;
    }

    .page-count{
      opacity:0.8;
      font-size:15px;
    }

    .viewer{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      position:relative;
    }

    .viewer img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
      transition:0.3s ease;
      background:white;
    }

    .controls{
      position:absolute;
      width:100%;
      display:flex;
      justify-content:space-between;
      padding:0 18px;
      top:50%;
      transform:translateY(-50%);
    }

    .btn{
      width:55px;
      height:55px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,0.18);
      color:white;
      font-size:24px;
      cursor:pointer;
      backdrop-filter:blur(5px);
      transition:0.25s ease;
    }

    .btn:hover{
      background:rgba(255,255,255,0.35);
      transform:scale(1.08);
    }

    .footer{
      text-align:center;
      padding:14px;
      color:rgba(255,255,255,0.75);
      font-size:14px;
      background:rgba(255,255,255,0.04);
    }

    @media(max-width:768px){

      .container{
        height:96vh;
      }

      .header h2{
        font-size:18px;
      }

      .btn{
        width:48px;
        height:48px;
        font-size:20px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h2>Temple Cafe Menu</h2>
      <div class="page-count" id="pageCount">
        Page 1 of 15
      </div>
    </div>

    <div class="viewer">

      <img id="bookImage" src="page1.jpg" alt="Menu Page">

      <div class="controls">
        <button class="btn" onclick="prevPage()">❮</button>
        <button class="btn" onclick="nextPage()">❯</button>
      </div>

    </div>

    <div class="footer">
      Use Arrow Keys or Swipe on Mobile
    </div>

  </div>

<script>

  // ===== TOTAL IMAGES =====
  const totalPages = 15;

  let currentPage = 1;

  const image = document.getElementById("bookImage");
  const pageCount = document.getElementById("pageCount");

  function updateImage(){

    image.style.opacity = 0;

    setTimeout(() => {

      image.src = `page${currentPage}.jpg`;

      pageCount.innerText = `Page ${currentPage} of ${totalPages}`;

      image.style.opacity = 1;

    },150);

  }

  function nextPage(){

    // Stop at page15.jpg
    if(currentPage < totalPages){

      currentPage++;
      updateImage();

    }

  }

  function prevPage(){

    // Stop at page1.jpg
    if(currentPage > 1){

      currentPage--;
      updateImage();

    }

  }

  // Keyboard Navigation

  document.addEventListener("keydown",(e)=>{

    if(e.key === "ArrowRight"){
      nextPage();
    }

    if(e.key === "ArrowLeft"){
      prevPage();
    }

  });

  // Mobile Swipe Support

  let startX = 0;

  document.addEventListener("touchstart",(e)=>{

    startX = e.touches[0].clientX;

  });

  document.addEventListener("touchend",(e)=>{

    let endX = e.changedTouches[0].clientX;

    if(startX - endX > 50){
      nextPage();
    }

    if(endX - startX > 50){
      prevPage();
    }

  });

</script>

</body>
</html>
