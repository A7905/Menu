<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Cafe Menu Viewer</title>
    <style>
        :root {
            --spacing: 16px;
            --primary-color: #007bff;
            --bg-color: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing);
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Fixed typo here */
            width: 100%;
            max-width: 500px;
            margin-bottom: var(--spacing);
            gap: var(--spacing);
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .pdf-container {
            width: 100%;
            max-width: 800px;
            flex-grow: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        iframe { width: 100%; height: 100%; min-height: 500px; border: none; }

        @media (min-width: 768px) { iframe { min-height: 75vh; } }
    </style>
</head>
<body>

    <h2>Temple Cafe Menu</h2>

    <div class="controls">
        <button id="prevBtn" onclick="changePage(-1)">Prev</button>
        <span id="page-info">Page <span id="current">1</span> / 15</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
    </div>

    <div class="pdf-container">
        <iframe id="pdfViewer" src="Temple_Cafe_Complete_Menu.pdf#page=1"></iframe>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 15;
        const viewer = document.getElementById('pdfViewer');
        const currentDisplay = document.getElementById('current');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const fileName = "Temple_Cafe_Complete_Menu.pdf";

        function updateUI() {
            currentDisplay.innerText = currentPage;
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
        }

        function changePage(step) {
            let targetPage = currentPage + step;
            if (targetPage >= 1 && targetPage <= totalPages) {
                currentPage = targetPage;
                viewer.src = `${fileName}#page=${currentPage}`;
                updateUI();
            }
        }
        updateUI();
    </script>
</body>
</html>
